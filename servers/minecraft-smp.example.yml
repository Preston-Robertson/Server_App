# Example: Vanilla / Paper / Fabric Minecraft Java server.
# Copy to servers/minecraft-smp.yml and edit. Upload the server.jar via the
# manager UI (Files tab -> area: install, path: server.jar) before starting.
#
# EULA: after the FIRST start attempt Minecraft writes eula.txt. Edit
# /srv/gameservers/minecraft-smp/eula.txt and set `eula=true` (only if you
# accept Mojang's EULA), then start again.
name: minecraft-smp
type: minecraft-java
install_dir: /srv/gameservers/minecraft-smp
world_dir: /opt/gamesrv/worlds/minecraft-smp
port: 25565
memory_mb: 6144
java_args: "-XX:+UseG1GC -XX:MaxGCPauseMillis=100"
start_cmd: "./start.sh"          # generated by the manager
stop_cmd: "stop"                 # sent to the MC console for graceful shutdown
auto_start_on_boot: true
extra_env: {}
rcon:
  enabled: false
  port: 25575
  password_env: MC_SMP_RCON_PW
backup:
  enabled: true
  # blank => world_dir
