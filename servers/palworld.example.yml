# Example: Palworld Dedicated Server (SteamCMD app id 2394010).
# Copy to servers/palworld.yml. The manager's "Install" action runs steamcmd
# and installs everything into install_dir. Saves are symlinked to world_dir
# so they land on the TrueNAS bind mount.
#
# Default port: 8211/UDP (game) + 27015/UDP (query). Open both in UFW.
name: palworld
type: steamcmd
install_dir: /srv/gameservers/palworld
world_dir: /opt/gamesrv/worlds/palworld
port: 8211
memory_mb: 16384                 # Palworld likes memory; adjust to your LXC cap
steam_app_id: 2394010
steam_beta: ""                   # optional public beta branch name
start_cmd: "./start.sh"          # regenerated by the manager on install/update
stop_cmd: ""                     # SIGINT via tmux, handled by generated stop.sh
auto_start_on_boot: true
extra_env: {}
rcon:
  enabled: false
backup:
  enabled: true
