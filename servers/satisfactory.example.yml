# Example: Satisfactory Dedicated Server (SteamCMD app id 1690800).
# Copy to servers/satisfactory.yml. The manager's "Install" action runs
# steamcmd and installs everything into install_dir. Saves + config are
# symlinked to world_dir so they land on the TrueNAS bind mount.
#
# Default port (Update 8 / 1.0+): 7777/UDP for both game traffic AND query.
# The old separate 15000 / 15777 ports are no longer used.
#
# Migrating an existing world:
#   1. Install (this file + Control -> Install).
#   2. Start once, then Stop \u2014 the game creates world_dir/SaveGames/server/.
#   3. Upload your existing .sav into that server/ folder via the Files tab.
#   4. Set it as the active save via the in-game Server Manager client,
#      or edit world_dir/Config/LinuxServer/Game.ini (AutoLoadSessionName).
name: satisfactory
type: steamcmd
install_dir: /srv/gameservers/satisfactory
world_dir: /opt/gamesrv/worlds/satisfactory
port: 7777
memory_mb: 12288                 # Satisfactory late-game likes 12\u201316 GB; tune to LXC cap
steam_app_id: 1690800
steam_beta: ""                   # e.g. "experimental" for the experimental branch
start_cmd: "./start.sh"          # regenerated by the manager on install/update
stop_cmd: ""                     # SIGINT via tmux, handled by generated stop.sh
auto_start_on_boot: true
# The recipe pins HOME=install_dir automatically. Override here only if you
# know what you're doing (breaking HOME breaks the save-dir symlink).
extra_env: {}
rcon:
  enabled: false
backup:
  enabled: true
